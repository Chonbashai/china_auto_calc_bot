services:
  china-auto-bot:
    build: .
    container_name: china-auto-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      - n8n-stack_default
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# Подключение к той же сети, что и PostgreSQL (n8n-stack).
# Если сеть или имя postgres-контейнера другие — проверьте на сервере:
#   docker network ls
#   docker network inspect <имя_сети>
#   docker ps --format "{{.Names}}" | grep postgres
networks:
  n8n-stack_default:
    external: true
